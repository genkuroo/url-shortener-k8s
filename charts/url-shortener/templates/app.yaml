# The app — the FastAPI URL shortener, run as a Deployment.
#
# A Deployment (not a StatefulSet) because the app is stateless: every replica is
# interchangeable and holds no data of its own (all state lives in Postgres).
# That's what lets Kubernetes freely create, kill, reschedule — and, later,
# autoscale — these pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "url-shortener.fullname" . }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.autoscaling.enabled }}
  # When the HorizontalPodAutoscaler is enabled (prod), we deliberately DON'T set
  # replicas here: the HPA owns the replica count, and if the chart also declared
  # it, Argo CD's self-heal would keep reverting the HPA's scaling back to this
  # static number — the two would fight. Leaving the field out lets the HPA be the
  # sole owner. Dev (no HPA) keeps its static replica count below.
  replicas: {{ .Values.app.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "url-shortener.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "url-shortener.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- if .Values.postgres.enabled }}
      # Block the app from starting until Postgres answers, so startup is clean
      # instead of a few noisy CrashLoopBackOff restarts. An init container must
      # run to completion before the main container starts.
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "waiting for postgres at $POSTGRES_HOST:$POSTGRES_PORT..."
                sleep 2
              done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_USER
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          # Assemble DATABASE_URL from the ConfigMap + Secret at runtime. $(VAR)
          # expands env vars defined earlier in this list, so the password never
          # appears here in the clear — only a reference to the Secret does.
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "url-shortener.fullname" . }}-config
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: {{ .Values.app.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: {{ .Values.app.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.livenessProbe.periodSeconds }}
          {{- with .Values.app.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
# The Service is the app's stable in-cluster address, load-balancing across
# whichever app pods are currently Ready. The Ingress points at this.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "url-shortener.fullname" . }}
  labels:
    {{- include "url-shortener.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  selector:
    {{- include "url-shortener.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 80
      targetPort: 8000
